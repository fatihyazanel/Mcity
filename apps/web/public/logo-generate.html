<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Manchester Logo Preview</title>
<style>
  body { background: #0a0e1a; display: flex; flex-wrap: wrap; gap: 24px; padding: 40px; font-family: sans-serif; }
  .card { background: #111827; padding: 24px; border-radius: 16px; border: 1px solid #1e293b; }
  h3 { color: #6cabdd; margin: 0 0 12px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
</style>
</head>
<body>

<!-- ─── LOGO 1: M Shield ─── -->
<div class="card">
  <h3>Square (1:1) — OG Image Background</h3>
  <svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#0a0e1a"/>
        <stop offset="100%" stop-color="#0f1f3d"/>
      </linearGradient>
      <linearGradient id="gold1" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#f0b429"/>
        <stop offset="100%" stop-color="#e8950a"/>
      </linearGradient>
      <linearGradient id="sky1" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#6cabdd"/>
        <stop offset="100%" stop-color="#4a90d9"/>
      </linearGradient>
      <filter id="glow1">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- Background -->
    <rect width="400" height="400" fill="url(#bg1)" rx="24"/>

    <!-- Subtle grid lines -->
    <line x1="0" y1="200" x2="400" y2="200" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

    <!-- Outer ring -->
    <circle cx="200" cy="190" r="140" fill="none" stroke="#6cabdd" stroke-opacity="0.15" stroke-width="1"/>
    <circle cx="200" cy="190" r="120" fill="none" stroke="#f0b429" stroke-opacity="0.1" stroke-width="0.5"/>

    <!-- Shield shape -->
    <path d="M200,68 L272,90 L272,175 Q272,235 200,270 Q128,235 128,175 L128,90 Z"
          fill="none" stroke="url(#sky1)" stroke-width="2.5" filter="url(#glow1)"/>
    <path d="M200,68 L272,90 L272,175 Q272,235 200,270 Q128,235 128,175 L128,90 Z"
          fill="#6cabdd" fill-opacity="0.06"/>

    <!-- M letter inside shield -->
    <text x="200" y="200" text-anchor="middle" dominant-baseline="middle"
          font-family="'Arial Black', sans-serif" font-weight="900"
          font-size="88" fill="url(#gold1)" filter="url(#glow1)" letter-spacing="-4">M</text>

    <!-- Dot accent -->
    <circle cx="200" cy="222" r="5" fill="url(#sky1)" opacity="0.9"/>

    <!-- MANCHESTER text -->
    <text x="200" y="308" text-anchor="middle"
          font-family="'Arial', sans-serif" font-weight="700"
          font-size="22" fill="#ffffff" letter-spacing="6" opacity="0.9">MANCHESTER</text>

    <!-- Tagline -->
    <text x="200" y="335" text-anchor="middle"
          font-family="'Arial', sans-serif" font-weight="400"
          font-size="11" fill="#6cabdd" letter-spacing="3" opacity="0.7">YOUR CITY · YOUR FOOTBALL</text>

    <!-- Bottom accent line -->
    <line x1="120" y1="350" x2="280" y2="350" stroke="url(#gold1)" stroke-width="1.5" opacity="0.5"/>

    <!-- Corner dots -->
    <circle cx="40" cy="40" r="3" fill="#f0b429" opacity="0.3"/>
    <circle cx="360" cy="40" r="3" fill="#f0b429" opacity="0.3"/>
    <circle cx="40" cy="360" r="3" fill="#6cabdd" opacity="0.3"/>
    <circle cx="360" cy="360" r="3" fill="#6cabdd" opacity="0.3"/>
  </svg>
</div>

<!-- ─── LOGO 2: Horizontal Banner ─── -->
<div class="card">
  <h3>Horizontal — Twitter/LinkedIn Banner</h3>
  <svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#0a0e1a"/>
        <stop offset="60%" stop-color="#0f1f3d"/>
        <stop offset="100%" stop-color="#0a0e1a"/>
      </linearGradient>
      <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#f0b429"/>
        <stop offset="100%" stop-color="#e8950a"/>
      </linearGradient>
      <linearGradient id="sky2" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#6cabdd"/>
        <stop offset="100%" stop-color="#4a90d9"/>
      </linearGradient>
      <filter id="glow2">
        <feGaussianBlur stdDeviation="4" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <rect width="600" height="200" fill="url(#bg2)" rx="16"/>

    <!-- Left accent bar -->
    <rect x="0" y="0" width="5" height="200" fill="url(#gold2)" rx="2" opacity="0.8"/>

    <!-- Shield icon (mini) -->
    <path d="M80,45 L110,55 L110,110 Q110,138 80,150 Q50,138 50,110 L50,55 Z"
          fill="none" stroke="url(#sky2)" stroke-width="2"/>
    <path d="M80,45 L110,55 L110,110 Q110,138 80,150 Q50,138 50,110 L50,55 Z"
          fill="#6cabdd" fill-opacity="0.05"/>

    <!-- M in mini shield -->
    <text x="80" y="107" text-anchor="middle" dominant-baseline="middle"
          font-family="'Arial Black', sans-serif" font-weight="900"
          font-size="44" fill="url(#gold2)" filter="url(#glow2)">M</text>

    <!-- Vertical divider -->
    <line x1="140" y1="40" x2="140" y2="160" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>

    <!-- MANCHESTER big text -->
    <text x="175" y="95" dominant-baseline="middle"
          font-family="'Arial Black', sans-serif" font-weight="900"
          font-size="46" fill="#ffffff" letter-spacing="-1">MANCHESTER</text>

    <!-- Tagline -->
    <text x="175" y="132" dominant-baseline="middle"
          font-family="'Arial', sans-serif" font-weight="500"
          font-size="13" fill="#6cabdd" letter-spacing="4" opacity="0.8">YOUR CITY · YOUR FOOTBALL · YOUR CULTURE</text>

    <!-- Right glow orb -->
    <circle cx="550" cy="100" r="60" fill="#6cabdd" fill-opacity="0.04"/>
    <circle cx="550" cy="100" r="35" fill="#f0b429" fill-opacity="0.03"/>

    <!-- Bottom accent -->
    <line x1="175" y1="158" x2="500" y2="158" stroke="url(#gold2)" stroke-width="1" opacity="0.3"/>
  </svg>
</div>

<!-- ─── LOGO 3: Icon only (favicon/avatar) ─── -->
<div class="card">
  <h3>Icon — Favicon / Profile Avatar</h3>
  <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#0f1f3d"/>
        <stop offset="100%" stop-color="#0a0e1a"/>
      </linearGradient>
      <linearGradient id="gold3" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#f5c842"/>
        <stop offset="100%" stop-color="#e8950a"/>
      </linearGradient>
      <linearGradient id="sky3" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#7bbde8"/>
        <stop offset="100%" stop-color="#4a90d9"/>
      </linearGradient>
      <filter id="glow3">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- Circle background -->
    <circle cx="100" cy="100" r="98" fill="url(#bg3)"/>
    <circle cx="100" cy="100" r="98" fill="none" stroke="url(#sky3)" stroke-width="2"/>

    <!-- Inner ring -->
    <circle cx="100" cy="100" r="82" fill="none" stroke="#f0b429" stroke-opacity="0.2" stroke-width="1"/>

    <!-- Shield -->
    <path d="M100,28 L148,44 L148,108 Q148,148 100,168 Q52,148 52,108 L52,44 Z"
          fill="none" stroke="url(#sky3)" stroke-width="2.5" filter="url(#glow3)"/>
    <path d="M100,28 L148,44 L148,108 Q148,148 100,168 Q52,148 52,108 L52,44 Z"
          fill="#6cabdd" fill-opacity="0.07"/>

    <!-- Big M -->
    <text x="100" y="108" text-anchor="middle" dominant-baseline="middle"
          font-family="'Arial Black', sans-serif" font-weight="900"
          font-size="72" fill="url(#gold3)" filter="url(#glow3)">M</text>

    <!-- Dot -->
    <circle cx="100" cy="126" r="4" fill="url(#sky3)"/>
  </svg>
</div>

<!-- ─── LOGO 4: OG Image (1200x630) preview ─── -->
<div class="card" style="width: 100%">
  <h3>OG Image Preview (1200×630 ratio)</h3>
  <svg width="700" height="368" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#070d1e"/>
        <stop offset="50%" stop-color="#0f1f3d"/>
        <stop offset="100%" stop-color="#0a1628"/>
      </linearGradient>
      <linearGradient id="gold4" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#f5c842"/>
        <stop offset="100%" stop-color="#d4870a"/>
      </linearGradient>
      <linearGradient id="sky4" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#7bbde8"/>
        <stop offset="100%" stop-color="#3a80d9"/>
      </linearGradient>
      <radialGradient id="orb4" cx="70%" cy="40%" r="40%">
        <stop offset="0%" stop-color="#6cabdd" stop-opacity="0.12"/>
        <stop offset="100%" stop-color="#6cabdd" stop-opacity="0"/>
      </radialGradient>
      <filter id="glow4">
        <feGaussianBlur stdDeviation="6" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- Background -->
    <rect width="1200" height="630" fill="url(#bg4)"/>
    <rect width="1200" height="630" fill="url(#orb4)"/>

    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>

    <!-- Left color bar -->
    <rect x="0" y="0" width="8" height="630" fill="url(#gold4)"/>

    <!-- Shield (large, left) -->
    <path d="M220,90 L340,125 L340,330 Q340,440 220,490 Q100,440 100,330 L100,125 Z"
          fill="none" stroke="url(#sky4)" stroke-width="3" filter="url(#glow4)"/>
    <path d="M220,90 L340,125 L340,330 Q340,440 220,490 Q100,440 100,330 L100,125 Z"
          fill="#6cabdd" fill-opacity="0.05"/>

    <!-- Big M in shield -->
    <text x="220" y="305" text-anchor="middle" dominant-baseline="middle"
          font-family="'Arial Black', sans-serif" font-weight="900"
          font-size="190" fill="url(#gold4)" filter="url(#glow4)">M</text>

    <!-- Dot under M -->
    <circle cx="220" cy="358" r="10" fill="url(#sky4)" opacity="0.9"/>

    <!-- Vertical divider -->
    <line x1="400" y1="80" x2="400" y2="550" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

    <!-- MANCHESTER -->
    <text x="450" y="240" dominant-baseline="middle"
          font-family="'Arial Black', sans-serif" font-weight="900"
          font-size="96" fill="#ffffff" letter-spacing="-2">MANCHESTER</text>

    <!-- Tagline -->
    <text x="450" y="308" dominant-baseline="middle"
          font-family="'Arial', sans-serif" font-weight="500"
          font-size="26" fill="#6cabdd" letter-spacing="6" opacity="0.85">YOUR CITY · YOUR FOOTBALL · YOUR CULTURE</text>

    <!-- Accent lines -->
    <line x1="450" y1="350" x2="1100" y2="350" stroke="url(#gold4)" stroke-width="1.5" opacity="0.4"/>

    <!-- Bottom info -->
    <text x="450" y="420" dominant-baseline="middle"
          font-family="'Arial', sans-serif" font-weight="400"
          font-size="20" fill="#ffffff" opacity="0.4" letter-spacing="2">manchester.city</text>

    <!-- Corner accents -->
    <rect x="1140" y="20" width="40" height="3" fill="url(#gold4)" opacity="0.5"/>
    <rect x="1177" y="20" width="3" height="40" fill="url(#gold4)" opacity="0.5"/>
    <rect x="20" y="607" width="40" height="3" fill="url(#sky4)" opacity="0.5"/>
    <rect x="20" y="570" width="3" height="40" fill="url(#sky4)" opacity="0.5"/>

    <!-- Background circles (decorative) -->
    <circle cx="950" cy="150" r="180" fill="none" stroke="#6cabdd" stroke-opacity="0.04" stroke-width="1"/>
    <circle cx="950" cy="150" r="120" fill="none" stroke="#f0b429" stroke-opacity="0.03" stroke-width="1"/>
    <circle cx="1100" cy="500" r="100" fill="none" stroke="#6cabdd" stroke-opacity="0.05" stroke-width="1"/>
  </svg>
</div>

</body>
</html>
