services:
  - type: web
    name: mcity
    runtime: node
    buildCommand: find . -name "package.json" -maxdepth 3 | head -20 && cd apps/web && npm install && npm run build
    startCommand: cd apps/web && npm start
    envVars:
      - key: NODE_VERSION
        value: 20.19.4
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: NEXT_PUBLIC_GA_ID
        sync: false
      - key: NEXT_PUBLIC_META_PIXEL_ID
        sync: false
    autoDeploy: true
